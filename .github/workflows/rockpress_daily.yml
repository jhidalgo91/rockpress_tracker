name: 🎸 RockPress Tracker – Informe Diario

on:
  # Ejecución automática diaria a las 8:00 UTC (9h CET / 10h CEST)
  schedule:
    - cron: '0 8 * * *'

  # Lanzamiento manual desde la pestaña Actions de GitHub
  workflow_dispatch:
    inputs:
      date_window_days:
        description: 'Días de ventana para buscar noticias'
        required: false
        default: '3'
      gemini_model:
        description: 'Modelo Gemini a usar'
        required: false
        default: 'gemini-1.5-flash'
      send_email:
        description: 'Enviar informe por email (true/false)'
        required: false
        default: 'true'

jobs:
  generate-report:
    name: Generar y Enviar Informe
    runs-on: ubuntu-latest

    # Necesario para poder hacer commit del informe y la memoria
    permissions:
      contents: write

    steps:
      # 1. Descarga el repositorio (incluye seen_articles.json si ya existe)
      - name: 📥 Checkout repositorio
        uses: actions/checkout@v4
        with:
          # Usamos fetch-depth: 1 (suficiente, no necesitamos historial)
          fetch-depth: 1

      # 2. Setup Python
      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Instalar dependencias
      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      # 4. Ejecutar el tracker
      - name: 🔍 Ejecutar RockPress Tracker
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM:        ${{ vars.EMAIL_FROM || 'RockPress Tracker <onboarding@resend.dev>' }}
          EMAIL_TO:          ${{ vars.EMAIL_TO }}
          GEMINI_MODEL:      ${{ inputs.gemini_model || 'gemini-1.5-flash' }}
          DATE_WINDOW_DAYS:  ${{ inputs.date_window_days || '3' }}
          SEND_EMAIL:        ${{ inputs.send_email || 'true' }}
        run: python rockpress_tracker.py

      # 5. Commit del informe + memoria actualizados
      - name: 📝 Commit informe y memoria al repositorio
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add informes/
          # Si no hay cambios (p.ej. ejecución duplicada el mismo día), salir sin error
          git diff --staged --quiet || (
            git commit -m "📰 Informe RockPress $(date +'%Y-%m-%d') [skip ci]" &&
            git push
          )

      # 6. Artefacto descargable (útil para revisar sin entrar al repo)
      - name: 📎 Subir informe como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: informe-${{ github.run_id }}
          path: informes/informe_*.md
          retention-days: 30
